<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Singing Girl</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #1a0533 0%, #3b0764 50%, #6d28d9 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    overflow: hidden;
  }

  /* Stars */
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(1); } to { opacity: 1; transform: scale(1.4); } }

  /* Stage */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Girl SVG container */
  .girl-wrap {
    animation: sway 1s ease-in-out infinite alternate;
    transform-origin: bottom center;
    filter: drop-shadow(0 10px 30px rgba(200,100,255,0.5));
  }
  @keyframes sway { from { transform: rotate(-4deg); } to { transform: rotate(4deg); } }

  /* Mouth open/close inside SVG */
  .mouth { animation: sing 0.4s ease-in-out infinite alternate; transform-origin: center; }
  @keyframes sing { from { d: path("M 82 118 Q 100 125 118 118"); } to { d: path("M 82 118 Q 100 135 118 118"); } }

  /* Hair bounce */
  .hair { animation: hairbounce 1s ease-in-out infinite alternate; transform-origin: 100px 60px; }
  @keyframes hairbounce { from { transform: scaleX(1); } to { transform: scaleX(1.03); } }

  /* Arms */
  .arm-left  { animation: armleft  1s ease-in-out infinite alternate; transform-origin: 70px 170px; }
  .arm-right { animation: armright 1s ease-in-out infinite alternate; transform-origin: 130px 170px; }
  @keyframes armleft  { from { transform: rotate(-15deg); } to { transform: rotate(15deg); } }
  @keyframes armright { from { transform: rotate(15deg);  } to { transform: rotate(-15deg); } }

  /* Dress */
  .dress { animation: dressbounce 1s ease-in-out infinite alternate; transform-origin: 100px 220px; }
  @keyframes dressbounce { from { transform: scaleX(1); } to { transform: scaleX(1.04); } }

  /* Lyrics box */
  .lyrics-box {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 16px 32px;
    text-align: center;
    backdrop-filter: blur(6px);
    min-width: 320px;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 30px rgba(200,100,255,0.3);
  }
  .lyric-line {
    color: #fff;
    font-size: 1.4rem;
    text-shadow: 0 0 12px #f0abfc, 0 0 3px #fff;
    animation: lyricpop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    letter-spacing: 1px;
  }
  @keyframes lyricpop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Floating notes */
  .note {
    position: absolute;
    font-size: 1.6rem;
    color: #f0abfc;
    pointer-events: none;
    animation: floatnote 2.5s ease-in forwards;
  }
  @keyframes floatnote {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-140px) scale(1.4) rotate(20deg); }
  }

  /* Title */
  .title {
    color: #f0abfc;
    font-size: 2rem;
    text-shadow: 0 0 20px #a855f7;
    margin-bottom: 8px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="stage">
  <div class="title">♪ La La La ♪</div>

  <!-- Cartoon Girl SVG -->
  <div class="girl-wrap" id="girl">
    <svg width="200" height="320" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">

      <!-- Shadow -->
      <ellipse cx="100" cy="315" rx="50" ry="8" fill="rgba(0,0,0,0.3)"/>

      <!-- Hair back -->
      <ellipse class="hair" cx="100" cy="72" rx="46" ry="50" fill="#7c3aed"/>

      <!-- Neck -->
      <rect x="90" y="140" width="20" height="25" rx="5" fill="#fcd34d"/>

      <!-- Dress / body -->
      <g class="dress">
        <polygon points="65,165 135,165 155,280 45,280" fill="#ec4899"/>
        <polygon points="65,165 100,175 135,165 150,200 50,200" fill="#f472b6"/>
        <!-- Belt -->
        <rect x="60" y="200" width="80" height="12" rx="6" fill="#be185d"/>
        <!-- Dress sparkles -->
        <circle cx="85" cy="220" r="3" fill="#fde68a" opacity="0.8"/>
        <circle cx="115" cy="235" r="2" fill="#fde68a" opacity="0.8"/>
        <circle cx="100" cy="250" r="3" fill="#fde68a" opacity="0.8"/>
        <circle cx="75" cy="248" r="2" fill="#fde68a" opacity="0.6"/>
        <circle cx="125" cy="218" r="2" fill="#fde68a" opacity="0.6"/>
      </g>

      <!-- Left arm -->
      <g class="arm-left">
        <rect x="35" y="165" width="18" height="55" rx="9" fill="#fcd34d"/>
        <!-- Hand -->
        <circle cx="44" cy="226" r="10" fill="#fcd34d"/>
        <!-- Mic -->
        <rect x="39" y="230" width="10" height="22" rx="3" fill="#9ca3af"/>
        <circle cx="44" cy="228" r="8" fill="#374151"/>
        <circle cx="44" cy="228" r="5" fill="#6b7280"/>
      </g>

      <!-- Right arm -->
      <g class="arm-right">
        <rect x="147" y="165" width="18" height="55" rx="9" fill="#fcd34d"/>
        <circle cx="156" cy="226" r="10" fill="#fcd34d"/>
      </g>

      <!-- Head -->
      <ellipse cx="100" cy="95" rx="42" ry="45" fill="#fcd34d"/>

      <!-- Hair front / bangs -->
      <path class="hair" d="M58,75 Q65,40 100,38 Q135,40 142,75 Q130,60 100,58 Q70,60 58,75Z" fill="#7c3aed"/>
      <!-- Side curls -->
      <ellipse cx="58" cy="100" rx="10" ry="18" fill="#7c3aed" transform="rotate(-10,58,100)"/>
      <ellipse cx="142" cy="100" rx="10" ry="18" fill="#7c3aed" transform="rotate(10,142,100)"/>
      <!-- Hair highlight -->
      <ellipse cx="88" cy="60" rx="12" ry="6" fill="#a855f7" opacity="0.5" transform="rotate(-15,88,60)"/>

      <!-- Eyes -->
      <!-- Left eye -->
      <ellipse cx="82" cy="92" rx="10" ry="11" fill="white"/>
      <ellipse cx="82" cy="94" rx="6" ry="7" fill="#1e3a5f"/>
      <circle  cx="82" cy="93" r="4" fill="#1d4ed8"/>
      <circle  cx="82" cy="92" r="2" fill="black"/>
      <circle  cx="85" cy="90" r="1.5" fill="white"/>
      <!-- Left lashes -->
      <line x1="72" y1="85" x2="68" y2="80" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <line x1="78" y1="83" x2="76" y2="77" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <line x1="84" y1="83" x2="84" y2="77" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>

      <!-- Right eye -->
      <ellipse cx="118" cy="92" rx="10" ry="11" fill="white"/>
      <ellipse cx="118" cy="94" rx="6" ry="7" fill="#1e3a5f"/>
      <circle  cx="118" cy="93" r="4" fill="#1d4ed8"/>
      <circle  cx="118" cy="92" r="2" fill="black"/>
      <circle  cx="121" cy="90" r="1.5" fill="white"/>
      <!-- Right lashes -->
      <line x1="116" y1="83" x2="116" y2="77" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <line x1="122" y1="83" x2="124" y2="77" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
      <line x1="128" y1="85" x2="132" y2="80" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>

      <!-- Rosy cheeks -->
      <ellipse cx="68" cy="108" rx="10" ry="7" fill="#f9a8d4" opacity="0.6"/>
      <ellipse cx="132" cy="108" rx="10" ry="7" fill="#f9a8d4" opacity="0.6"/>

      <!-- Nose -->
      <ellipse cx="100" cy="108" rx="4" ry="3" fill="#f59e0b" opacity="0.6"/>

      <!-- Mouth (open/singing) -->
      <path class="mouth" d="M 82 118 Q 100 130 118 118" stroke="#be185d" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 84 120 Q 100 136 116 120 Q 100 142 84 120Z" fill="#be185d"/>
      <ellipse cx="100" cy="128" rx="8" ry="5" fill="#9f1239"/>
      <!-- Teeth -->
      <rect x="88" y="120" width="10" height="6" rx="2" fill="white"/>
      <rect x="100" y="120" width="10" height="6" rx="2" fill="white"/>

      <!-- Hairband/accessory -->
      <ellipse cx="72" cy="68" rx="10" ry="10" fill="#fbbf24"/>
      <ellipse cx="72" cy="68" rx="6" ry="6" fill="#f59e0b"/>
      <circle  cx="72" cy="68" r="3" fill="#fde68a"/>

      <!-- Feet / shoes -->
      <ellipse cx="80" cy="285" rx="18" ry="10" fill="#7c3aed"/>
      <ellipse cx="120" cy="285" rx="18" ry="10" fill="#7c3aed"/>
      <ellipse cx="80" cy="283" rx="14" ry="7" fill="#a855f7"/>
      <ellipse cx="120" cy="283" rx="14" ry="7" fill="#a855f7"/>
    </svg>
  </div>

  <!-- Lyrics display -->
  <div class="lyrics-box">
    <span class="lyric-line" id="lyric">🎵 Loading... 🎵</span>
  </div>
</div>

<script>
  // Starfield
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s`;
    starsEl.appendChild(s);
  }

  // Lyrics
  const lyrics = [
    "🎵 La la la, sing with me! 🎵",
    "✨ Stars are shining bright tonight ✨",
    "🌙 Under the moonlit sky so wide 🌙",
    "💜 Dancing to the melody 💜",
    "🎶 Music fills the whole night air 🎶",
    "🌟 Every note a bright new dream 🌟",
    "🎤 Singing loud from deep inside 🎤",
    "💫 My heart soars on every beat 💫",
    "🎵 Oh la la, here we go! 🎵",
    "🌸 Flowers bloom when songs are sung 🌸",
    "⭐ Reach the high note — don't give up! ⭐",
    "🎶 La la la la la la la! 🎶",
  ];

  let idx = 0;
  const lyricEl = document.getElementById('lyric');

  function nextLyric() {
    lyricEl.style.animation = 'none';
    lyricEl.offsetHeight; // reflow
    lyricEl.style.animation = '';
    lyricEl.className = 'lyric-line';
    lyricEl.textContent = lyrics[idx % lyrics.length];
    idx++;
  }

  nextLyric();
  setInterval(nextLyric, 2200);

  // Floating music notes
  const notes = ['♩','♪','♫','♬','🎵','🎶'];
  const girl = document.getElementById('girl');

  function spawnNote() {
    const n = document.createElement('div');
    n.className = 'note';
    n.textContent = notes[Math.floor(Math.random() * notes.length)];
    const rect = girl.getBoundingClientRect();
    n.style.left = (rect.left + 60 + Math.random() * 80) + 'px';
    n.style.top  = (rect.top  + 20 + Math.random() * 40) + 'px';
    n.style.animationDuration = (1.8 + Math.random()) + 's';
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 2800);
  }

  setInterval(spawnNote, 500);
</script>
</body>
</html>
