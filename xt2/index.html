<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Singing Girl 🎵</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(160deg, #ff9de2 0%, #ffc0d9 40%, #c8a8ff 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  overflow: hidden;
}

/* BG circles */
.bubble {
  position: fixed;
  border-radius: 50%;
  opacity: 0.18;
  animation: floatbub linear infinite;
}
@keyframes floatbub {
  0%   { transform: translateY(110vh) scale(1); }
  100% { transform: translateY(-20vh) scale(1.1); }
}

/* Stage floor */
.floor {
  width: 340px; height: 22px;
  background: linear-gradient(90deg, #e879f9, #a855f7, #e879f9);
  border-radius: 50%;
  margin-top: -10px;
  box-shadow: 0 0 40px #e879f9;
}

/* Spotlight */
.spotlight {
  position: fixed;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 160px solid transparent;
  border-right: 160px solid transparent;
  border-top: 420px solid rgba(255,255,180,0.12);
  pointer-events: none;
}

/* Girl container */
.scene {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

.girl {
  animation: sway 0.9s ease-in-out infinite alternate;
  transform-origin: bottom center;
  cursor: pointer;
  filter: drop-shadow(0 6px 24px rgba(168,85,247,0.45));
}
@keyframes sway { from { transform: rotate(-5deg) translateX(-4px); } to { transform: rotate(5deg) translateX(4px); } }

/* Lyrics bubble */
.lyrics-wrap {
  position: relative;
  margin-top: 18px;
}
.lyrics-bubble {
  background: white;
  border-radius: 28px;
  padding: 14px 28px;
  font-size: 1.35rem;
  color: #7c3aed;
  text-align: center;
  min-width: 300px;
  max-width: 400px;
  box-shadow: 0 4px 20px rgba(168,85,247,0.3), 0 0 0 3px #e879f9;
  position: relative;
  animation: bubblein 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes bubblein { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.lyrics-bubble::after {
  content: '';
  position: absolute;
  top: -18px; left: 50%;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 20px solid white;
}

/* Floating notes */
.note {
  position: fixed;
  font-size: 1.8rem;
  pointer-events: none;
  animation: notefloat 2s ease-out forwards;
  z-index: 10;
}
@keyframes notefloat {
  0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), -160px) rotate(30deg) scale(1.5); }
}

/* Stars */
.star {
  position: fixed;
  font-size: 1.2rem;
  animation: startwinkle 1.5s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes startwinkle { from { opacity:0.3; transform:scale(0.8); } to { opacity:1; transform:scale(1.2); } }
</style>
</head>
<body>

<div class="spotlight"></div>
<div id="bubbles"></div>
<div id="stars-wrap"></div>

<div class="scene">
  <div class="girl" id="girl">
    <svg width="220" height="340" viewBox="0 0 220 340" xmlns="http://www.w3.org/2000/svg">

      <!-- Shadow -->
      <ellipse cx="110" cy="334" rx="60" ry="9" fill="rgba(100,0,100,0.2)"/>

      <!-- DRESS -->
      <polygon points="72,185 148,185 175,310 45,310" fill="#f472b6"/>
      <!-- Dress shine -->
      <polygon points="72,185 110,195 148,185 158,230 62,230" fill="#f9a8d4"/>
      <!-- Dress dots -->
      <circle cx="92" cy="245" r="5" fill="#fde68a" opacity="0.9"/>
      <circle cx="128" cy="255" r="4" fill="#fde68a" opacity="0.9"/>
      <circle cx="110" cy="270" r="5" fill="#fde68a" opacity="0.9"/>
      <circle cx="80" cy="268" r="3" fill="#fde68a" opacity="0.7"/>
      <circle cx="138" cy="240" r="3" fill="#fde68a" opacity="0.7"/>
      <!-- Belt -->
      <rect x="66" y="218" width="88" height="14" rx="7" fill="#be185d"/>
      <circle cx="110" cy="225" r="7" fill="#fbbf24"/>
      <circle cx="110" cy="225" r="4" fill="#fde68a"/>

      <!-- Legs -->
      <rect x="86" y="305" width="16" height="28" rx="8" fill="#fde68a"/>
      <rect x="118" y="305" width="16" height="28" rx="8" fill="#fde68a"/>
      <!-- Shoes -->
      <ellipse cx="94" cy="334" rx="16" ry="9" fill="#7c3aed"/>
      <ellipse cx="126" cy="334" rx="16" ry="9" fill="#7c3aed"/>
      <ellipse cx="94" cy="331" rx="11" ry="6" fill="#a855f7"/>
      <ellipse cx="126" cy="331" rx="11" ry="6" fill="#a855f7"/>

      <!-- LEFT ARM (with mic) -->
      <g style="animation: armleft 0.9s ease-in-out infinite alternate; transform-origin: 72px 185px;">
        <rect x="44" y="182" width="20" height="58" rx="10" fill="#fde68a"/>
        <circle cx="54" cy="244" r="11" fill="#fde68a"/>
        <!-- Mic handle -->
        <rect x="49" y="252" width="11" height="26" rx="4" fill="#9ca3af"/>
        <!-- Mic head -->
        <ellipse cx="54" cy="250" rx="12" ry="14" fill="#374151"/>
        <ellipse cx="54" cy="250" rx="8" ry="9" fill="#4b5563"/>
        <!-- Mic shine -->
        <ellipse cx="50" cy="245" rx="3" ry="4" fill="rgba(255,255,255,0.25)"/>
      </g>
      <style>
        @keyframes armleft  { from { transform: rotate(-18deg); } to { transform: rotate(10deg); } }
        @keyframes armright { from { transform: rotate(18deg);  } to { transform: rotate(-10deg); } }
      </style>

      <!-- RIGHT ARM -->
      <g style="animation: armright 0.9s ease-in-out infinite alternate; transform-origin: 148px 185px;">
        <rect x="156" y="182" width="20" height="58" rx="10" fill="#fde68a"/>
        <circle cx="166" cy="244" r="11" fill="#fde68a"/>
      </g>

      <!-- NECK -->
      <rect x="100" y="153" width="20" height="30" rx="8" fill="#fde68a"/>

      <!-- HEAD -->
      <ellipse cx="110" cy="108" rx="50" ry="53" fill="#fde68a"/>

      <!-- HAIR BACK -->
      <ellipse cx="110" cy="98" rx="53" ry="57" fill="#dc2626"/>
      <!-- Hair covers bottom -->
      <ellipse cx="110" cy="108" rx="50" ry="53" fill="#fde68a"/>

      <!-- HAIR FRONT + SIDES -->
      <!-- Bangs -->
      <path d="M60,90 Q65,42 110,38 Q155,42 160,90 Q148,65 110,63 Q72,65 60,90Z" fill="#dc2626"/>
      <!-- Side hair left -->
      <ellipse cx="62" cy="115" rx="13" ry="25" fill="#dc2626" transform="rotate(-8,62,115)"/>
      <!-- Side hair right -->
      <ellipse cx="158" cy="115" rx="13" ry="25" fill="#dc2626" transform="rotate(8,158,115)"/>
      <!-- Long hair strands -->
      <path d="M62,128 Q50,160 55,185" stroke="#dc2626" stroke-width="16" fill="none" stroke-linecap="round"/>
      <path d="M158,128 Q170,160 165,185" stroke="#dc2626" stroke-width="16" fill="none" stroke-linecap="round"/>
      <!-- Hair shine -->
      <ellipse cx="95" cy="62" rx="14" ry="6" fill="#ef4444" opacity="0.5" transform="rotate(-15,95,62)"/>

      <!-- Hair bow -->
      <!-- Left part -->
      <ellipse cx="80" cy="56" rx="16" ry="11" fill="#fbbf24" transform="rotate(-30,80,56)"/>
      <!-- Right part -->
      <ellipse cx="108" cy="48" rx="16" ry="11" fill="#fbbf24" transform="rotate(30,108,48)"/>
      <!-- Center -->
      <circle cx="94" cy="52" r="9" fill="#f59e0b"/>
      <circle cx="94" cy="52" r="5" fill="#fde68a"/>

      <!-- EYES -->
      <!-- Left eye -->
      <ellipse cx="88" cy="102" rx="12" ry="13" fill="white"/>
      <ellipse cx="88" cy="104" rx="7" ry="8" fill="#1e40af"/>
      <circle  cx="88" cy="103" r="4.5" fill="#1e3a8a"/>
      <circle  cx="88" cy="103" r="2.5" fill="black"/>
      <circle  cx="91" cy="100" r="2"   fill="white"/>
      <!-- Left lashes top -->
      <line x1="76" y1="93" x2="71" y2="87" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="83" y1="90" x2="80" y2="83" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="90" y1="90" x2="90" y2="83" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="97" y1="92" x2="100" y2="86" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Left eye shine (blinking animation) -->

      <!-- Right eye -->
      <ellipse cx="132" cy="102" rx="12" ry="13" fill="white"/>
      <ellipse cx="132" cy="104" rx="7" ry="8" fill="#1e40af"/>
      <circle  cx="132" cy="103" r="4.5" fill="#1e3a8a"/>
      <circle  cx="132" cy="103" r="2.5" fill="black"/>
      <circle  cx="135" cy="100" r="2"   fill="white"/>
      <!-- Right lashes top -->
      <line x1="120" y1="92" x2="117" y2="86" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="127" y1="90" x2="125" y2="83" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="134" y1="90" x2="134" y2="83" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="141" y1="93" x2="145" y2="87" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Blush -->
      <ellipse cx="74" cy="118" rx="12" ry="8" fill="#fca5a5" opacity="0.65"/>
      <ellipse cx="146" cy="118" rx="12" ry="8" fill="#fca5a5" opacity="0.65"/>

      <!-- Nose -->
      <path d="M107,120 Q110,124 113,120" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- MOUTH – singing open -->
      <g id="mouth">
        <path d="M90,133 Q110,145 130,133" stroke="#be185d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Inside mouth -->
        <path d="M92,135 Q110,150 128,135 Q110,162 92,135Z" fill="#be185d"/>
        <ellipse cx="110" cy="144" rx="10" ry="7" fill="#9f1239"/>
        <!-- Teeth -->
        <rect x="97" y="135" width="12" height="8" rx="3" fill="white"/>
        <rect x="111" y="135" width="12" height="8" rx="3" fill="white"/>
        <!-- Tongue -->
        <ellipse cx="110" cy="152" rx="8" ry="5" fill="#f87171"/>
      </g>

    </svg>
  </div>

  <div class="floor"></div>

  <div class="lyrics-wrap">
    <div class="lyrics-bubble" id="lbox">
      <span id="lyric">🎵 La la la...</span>
    </div>
  </div>
</div>

<script>
// Background bubbles
const bc = document.getElementById('bubbles');
const colors = ['#f9a8d4','#c4b5fd','#fde68a','#a5f3fc','#bbf7d0'];
for (let i=0; i<14; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const sz = 40 + Math.random()*120;
  b.style.cssText = `width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};left:${Math.random()*100}%;bottom:-${sz}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s`;
  bc.appendChild(b);
}

// Stars
const sw = document.getElementById('stars-wrap');
const starEmojis = ['⭐','✨','💫','🌟','⚡'];
for (let i=0; i<16; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = starEmojis[i%starEmojis.length];
  s.style.cssText = `top:${Math.random()*75}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1+Math.random()*1.5}s;font-size:${0.8+Math.random()*1.4}rem`;
  sw.appendChild(s);
}

// Lyrics
const lyrics = [
  "🎵 La la la, hear me sing! 🎵",
  "✨ My voice can reach the sky ✨",
  "💜 Oh oh oh, feel the beat! 💜",
  "🌈 Colors dance around me now 🌈",
  "🎤 Microphone, let's go! 🎤",
  "🌸 Every note is pure and sweet 🌸",
  "⭐ Shining like a shooting star ⭐",
  "🎶 Sing it loud, sing it proud! 🎶",
  "💖 Music fills my heart with joy 💖",
  "🌙 Under stars I serenade 🌙",
  "🎵 La la la la la la la! 🎵",
  "✨ Yeah yeah yeah, let's go! ✨",
];

let idx = 0;
const lbox  = document.getElementById('lbox');
const lyric = document.getElementById('lyric');

function nextLyric() {
  // Re-trigger animation
  lbox.style.animation = 'none';
  lbox.offsetHeight;
  lbox.style.animation = 'bubblein 0.35s cubic-bezier(0.175,0.885,0.32,1.275)';
  lyric.textContent = lyrics[idx % lyrics.length];
  idx++;
}
nextLyric();
setInterval(nextLyric, 2000);

// Floating notes
const noteChars = ['♩','♪','♫','♬','🎵','🎶','🎤','🎼'];
const girl = document.getElementById('girl');

function spawnNote() {
  const n = document.createElement('div');
  n.className = 'note';
  n.textContent = noteChars[Math.floor(Math.random()*noteChars.length)];
  const r = girl.getBoundingClientRect();
  n.style.left = (r.left + 50 + Math.random()*120) + 'px';
  n.style.top  = (r.top  + 30 + Math.random()*50)  + 'px';
  n.style.setProperty('--dx', (Math.random()*80-40)+'px');
  n.style.animationDuration = (1.5 + Math.random()*1) + 's';
  n.style.color = colors[Math.floor(Math.random()*colors.length)];
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2600);
}
setInterval(spawnNote, 420);
</script>
</body>
</html>
